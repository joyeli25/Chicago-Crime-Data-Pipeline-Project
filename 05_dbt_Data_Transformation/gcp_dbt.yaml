id: 04_gcp_dbt
namespace: deproject
inputs:
  - id: dbt_command
    type: SELECT
    allowCustomValue: true
    defaults: dbt build
    values:
      - dbt clean
      - dbt deps
      - dbt build # to run models
      - dbt debug # use when running the first time to validate DB connection

tasks: 
  - id: working-directory
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repository
        type: io.kestra.plugin.git.Clone
        url: https://github.com/joyeli25/DE_Zoomcamp_Project_2025-26
        branch: v2026

      - id: dbt-build
        type: io.kestra.plugin.dbt.cli.DbtCLI
        inputFiles:
          sa.json: "{{kv('GCP_CREDS')}}"
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        commands:
          - dbt deps --project-dir Project/03_dbt_Data_Transformation/chi_crime_project
          - dbt seed --target dev --project-dir Project/03_dbt_Data_Transformation/chi_crime_project
          - dbt run --target dev --project-dir Project/03_dbt_Data_Transformation/chi_crime_project
          - "{{ inputs.dbt_command }} --project-dir Project/03_dbt_Data_Transformation/chi_crime_project"
        profiles: |
          default:
            outputs:
              dev:
                type: bigquery
                dataset: chi_crime_dataset
                project: chi-crime-project-491821
                keyfile: sa.json
                method: service-account
                location: US
                priority: interactive
                threads: 16
                timeout_seconds: 300
                fixed_retries: 1
            target: dev